include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = external-message-adapter

# Overriding the userAgent value so that we can avoid displaying AHC/2.1 in Kibana Logs
play.ws.useragent = ${appName}

play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

play.modules.enabled += "uk.gov.hmrc.externalmessageadapter.ExternalMessageAdapterModule"

play.filters.enabled += "uk.gov.hmrc.externalmessageadapter.AuditFilter"

# The application languages
# ~~~~~
application.langs = "en,cy"

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Controller
# ~~~~~
# By default all controllers will have authorisation, logging and
# auditing (transaction monitoring) enabled.
# The below controllers are the default exceptions to this rule.

controllers {
  # 300 is the default, you may need to change this according to your needs
  confidenceLevel = 300
}

# Microservice specific config

auditing {
  enabled = true
}

mongodb {
  uri = "mongodb://localhost:27017/external-message-adapter"
}

microservice {
  services {
    auth {
      host = localhost
      port = 8500
    }
    entity-resolver {
      host = localhost
      port = 8015
    }
    preferences {
      host = localhost
      port = 8025
    }
    secure-message {
      host = localhost
      port = 9051
    }

    taxpayer-data {
      host = localhost
      port = 8091
    }
    
    taxpayer-data-hip {
      host = localhost
      port = 8091
      client-id = "some client-id"
      client-secret = "some client-secret"
      enabled = false
    }

    enrolment-store-proxy {
      host = localhost
      port = 7775
    }

    eis {
      environment = dev
      host = localhost
      port = 8088
      bearer-token = AbCdEf123456
      endpoint = "/sa-forms/suppression/send-letter"
    }
  }
}

scheduling {
  externalMessageAdapterCleanup {
    taskEnabled = true
    initialDelay = "1 minute"
    interval = "2 minutes"
    deleteAfter = "365 days"
    batchSize = 1000
    startAt = "08:00"
    stopAt = "23:00"
    lockDuration = "1 hour"
  }
}

auditEventMaxSize = 128000
gmc.denylist = []

play.http.parser.maxMemoryBuffer=10MB